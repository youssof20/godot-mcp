name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: node --input-type=module -e "import { IMPLEMENTED_TOOLS } from './dist/tools/constants.js'; if (IMPLEMENTED_TOOLS.length < 150) { console.error('Tool count too low'); process.exit(1); }"
